name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:


  lint:
    name: Py linting
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.14
      - name: Install dependencies
        run: |
              python -m pip install --upgrade pip
              pip install ruff
      - name: Ruff lint
        run: |
              ruff check --output-format=github .
      - name: Ruff format
        run: |
             ruff format --check .


  jslint:
    name: JS Linting
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v6
    - name: Install JS dependencies
      run: npm install -g standard
    - name: Lint JS files
      run: standard jupyter_rfb


  tests:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Python versions
          - name: Linux py39
            os: ubuntu-latest
            pyversion: '3.9'
          - name: Linux py310
            os: ubuntu-latest
            pyversion: '3.10'
          - name: Linux py311
            os: ubuntu-latest
            pyversion: '3.11'
          - name: Linux py312
            os: ubuntu-latest
            pyversion: '3.12'
          - name: Linux py313
            os: ubuntu-latest
            pyversion: '3.13'
          - name: Linux py314
            os: ubuntu-latest
            pyversion: '3.14'
          # Other systems / interpreters
          - name: Linux pypy3
            os: ubuntu-latest
            pyversion: 'pypy3.9'
          - name: Windows py311
            os: windows-latest
            pyversion: '3.11'
          - name: MacOS py311
            os: macos-latest
            pyversion: '3.11'
          - name: Linux py313 complete
            os: ubuntu-latest
            pyversion: '3.13'
            alltests: true

    steps:

      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.pyversion }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.pyversion }}
      - name: Install dependencies
        shell: bash
        run: |
            python -m pip install --upgrade pip
            pip install .[tests]
            rm -rf ./jupyter_rfb ./build ./egg-info
      - name: Install more dependencies
        if: ${{ matrix.alltests }}
        shell: bash
        run: |
            pip install -U pillow opencv-python-headless
      - name: Test with pytest
        shell: bash
        run: |
            python -c "import sys; print(sys.version, '\n', sys.prefix)";
            pytest -v .

            # Publish to Github and Pypi


  build-release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.14
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U flit twine
      - name: Create source distribution
        run: |
          python -m flit build --no-use-vcs --format sdist
      - name: Build wheel
        run: |
          python -m flit build --no-use-vcs --format wheel
      - name: Test sdist
        shell: bash
        run: |
          rm -rf ./jupyter_rfb
          pushd $HOME
          pip install $GITHUB_WORKSPACE/dist/*.tar.gz
          python -c "import jupyter_rfb; print(jupyter_rfb.__version__)"
          popd
          # don't run tests, we just want to know if the sdist can be installed
          pip uninstall -y jupyter_rfb
          git reset --hard HEAD
      - name: Twine check
        run: |
          twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          path: dist
          name: dist

  publish:
    name: Publish release to Github and Pypi
    runs-on: ubuntu-latest
    needs: [lint, jslint, tests, build-release]
    if: success() && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/jupyter_rfb
    permissions:
      contents: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.14
    - name: Download assets
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: |
          dist/*.tar.gz
          dist/*.whl
        draft: true
        prerelease: false
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true

